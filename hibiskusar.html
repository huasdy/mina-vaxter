<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Hibiskus</title>
  <style>
    :root {
      --bg: #f5f1ea; --paper: #fffdf8; --ink: #2b251f; --muted: #6f655b;
      --line: #ded2c2; --accent: #7d4f3b; --chip: #efe6da;
      --shadow: 0 14px 40px rgba(62, 43, 28, 0.12); --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, rgba(125,79,59,0.10), transparent 35rem),
                  radial-gradient(circle at top right, rgba(96,119,97,0.10), transparent 30rem),
                  var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    header { padding: 46px 22px 30px; text-align: center; }
    nav { margin-bottom: 18px; text-align: center; }
    nav { display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
    nav a { color: var(--accent); text-decoration: none; font-weight: 750; }
    nav a.current { color: var(--ink); }
    .eyebrow { letter-spacing: .18em; text-transform: uppercase; font-size: .78rem; color: var(--accent); font-weight: 800; }
    h1 { margin: 8px 0 8px; font-family: Georgia, "Times New Roman", serif; font-size: clamp(2.7rem, 8vw, 5.6rem); line-height: .92; font-weight: 500; }
    .subtitle { margin: 0 auto; max-width: 860px; color: var(--muted); font-size: 1.05rem; }
    .toolbar {
      background: rgba(245,241,234,.84); border-top: 1px solid rgba(222,210,194,.75);
      border-bottom: 1px solid rgba(222,210,194,.95); padding: 14px 18px;
    }
    .toolbar-inner { max-width: 1240px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto auto auto auto auto; gap: 10px; align-items: center; }
    input, select, button, label.filebutton {
      border: 1px solid var(--line); background: var(--paper); border-radius: 999px; color: var(--ink);
      padding: 11px 14px; font-size: .95rem; font: inherit;
    }
    input[type="search"] { width: 100%; min-width: 0; }
    button, label.filebutton { cursor: pointer; background: var(--accent); color: white; border-color: var(--accent); font-weight: 750; white-space: nowrap; }
    button.secondary, label.filebutton.secondary { background: var(--paper); color: var(--accent); border-color: rgba(125,79,59,.35); }
    input[type="file"] { display: none; }
    main { max-width: 1240px; margin: 0 auto; padding: 26px 18px 64px; }
    .helpbox { max-width: 1240px; margin: 0 auto 18px; background: rgba(255,253,248,.78); border: 1px solid var(--line); border-radius: 18px; padding: 13px 16px; color: var(--muted); font-size: .92rem; }
    .stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; color: var(--muted); }
    .stat { background: rgba(255,253,248,.74); border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; font-size: .92rem; font-weight: 650; }
    .batch-log { background: rgba(255,253,248,.78); border: 1px solid var(--line); border-radius: 18px; padding: 14px 16px; margin-bottom: 22px; box-shadow: var(--shadow); }
    .batch-log-head { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .batch-log h2 { font-size: 1.35rem; margin: 0 0 4px; }
    .batch-log-summary { color: var(--muted); font-size: .94rem; font-weight: 650; }
    .batch-log-toggle { background: var(--paper); color: var(--accent); border-color: rgba(125,79,59,.35); padding: 8px 12px; flex: 0 0 auto; }
    .batch-log-detail { display: grid; gap: 14px; margin-top: 14px; }
    .batch-log-detail[hidden] { display: none; }
    .batch-log-section h3 { margin: 0 0 7px; color: var(--accent); text-transform: uppercase; letter-spacing: .14em; font-size: .75rem; }
    .batch-facts, .batch-log-list { display: grid; gap: 8px; }
    .batch-fact { color: var(--muted); font-weight: 650; }
    .batch-method { color: var(--muted); margin: 0; }
    .batch-log-item { border-top: 1px solid var(--line); padding-top: 10px; color: var(--muted); }
    .batch-log-item:first-child { border-top: 0; padding-top: 0; }
    .batch-log-meta { display: flex; flex-wrap: wrap; gap: 8px; align-items: baseline; color: var(--ink); font-weight: 800; }
    .batch-log-id { color: var(--accent); }
    .batch-log-note { margin-top: 3px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 18px; }
    .empty { grid-column: 1 / -1; background: rgba(255,253,248,.78); border: 1px solid var(--line); border-radius: 18px; padding: 24px; color: var(--muted); text-align: center; font-weight: 650; }
    .plant-card { background: var(--paper); border: 1px solid rgba(222,210,194,.95); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 100%; }
    .image-wrap { position: relative; aspect-ratio: 4 / 5; background: linear-gradient(135deg, rgba(125,79,59,.16), rgba(96,119,97,.14)), #eadfce; overflow: hidden; }
    .image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
    .date-ribbon { position: absolute; left: 12px; bottom: 12px; background: rgba(43,37,31,.76); color: white; border-radius: 999px; padding: 6px 10px; font-size: .8rem; font-weight: 750; backdrop-filter: blur(8px); }
    .thumbs { display: flex; gap: 8px; padding: 10px 12px 0; flex-wrap: wrap; }
    .thumb { border: 2px solid transparent; background: transparent; padding: 0; border-radius: 12px; overflow: hidden; width: 58px; height: 58px; cursor: pointer; }
    .thumb.active { border-color: var(--accent); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    h2 { margin: 0; font-family: Georgia, "Times New Roman", serif; font-size: 1.55rem; line-height: 1.08; font-weight: 650; }
    .plant-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .score { min-width: 42px; text-align: center; border-radius: 999px; background: var(--chip); color: var(--muted); padding: 5px 9px; font-weight: 800; font-size: .85rem; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { background: var(--chip); color: var(--muted); border-radius: 999px; padding: 5px 9px; font-size: .8rem; font-weight: 700; }
    .chip.green { background: rgba(96,119,97,.17); color: #435943; }
    .chip.gold { background: rgba(181,138,69,.18); color: #77572a; }
    dl { display: grid; grid-template-columns: auto 1fr; gap: 6px 10px; margin: 0; font-size: .94rem; }
    dt { color: var(--muted); font-weight: 800; }
    dd { margin: 0; }
    .notes { color: var(--muted); border-top: 1px solid var(--line); padding-top: 12px; margin-top: auto; font-size: .94rem; min-height: 2.2em; }
    dialog { border: none; padding: 0; background: transparent; max-width: min(92vw, 1000px); max-height: 92vh; }
    dialog::backdrop { background: rgba(0,0,0,.72); }
    .modal-img { display: block; max-width: 100%; max-height: 88vh; border-radius: 18px; background: white; }
    .modal-caption { color: white; text-align: center; padding-top: 10px; font-weight: 700; }
    footer { text-align: center; color: var(--muted); padding: 26px 18px 44px; font-size: .92rem; }
    @media (max-width: 700px) {
      .image-wrap { aspect-ratio: auto; height: min(280px, 65vw); }
    }
    @media (max-width: 900px) { .toolbar-inner { grid-template-columns: 1fr; } select, button, label.filebutton { width: 100%; text-align: center; } }
</style>

  <script>
    let plants = [];
    let plantCSVText = document.querySelector("#defaultPlantsCSV").textContent;
    let photoCSVText = document.querySelector("#defaultPhotosCSV").textContent;
    let logCSVText = document.querySelector("#defaultLogsCSV").textContent;

    const grid = document.querySelector("#grid");
    const search = document.querySelector("#search");
    const batchFilter = document.querySelector("#batchFilter");
    const statusFilter = document.querySelector("#statusFilter");
    const sortSelect = document.querySelector("#sortSelect");
    const clearBtn = document.querySelector("#clearBtn");
    const stats = document.querySelector("#stats");
    const batchLog = document.querySelector("#batchLog");
    let batchLogOpen = false;
    const hibiscusBatches = {
      "PL-H02": {
        summary: "PL-H02 · Sådd 2026-06-25 · Jord · undervärme ca 25 °C · första grodd 2026-07-06 · B, D grodda",
        method: "Sådd i jord med undervärme ca 25 °C. Djupare sådd än tidigare rockwool-försök. Fukten hålls främst via kapillärmatta, med mistning ovanifrån, för att undvika övervattning.",
        facts: [
          "PL-H02-A · 11 frön · Surprise Pack",
          "PL-H02-B · 6 frön · 012 × 030",
          "PL-H02-C · 6 frön · 030 × 041",
          "PL-H02-D · 6 frön · 012 × okänd"
        ]
      }
    };
    const printBtn = document.querySelector("#printBtn");
    const dialog = document.querySelector("#photoDialog");
    const modalImg = document.querySelector("#modalImg");
    const modalCaption = document.querySelector("#modalCaption");

    function escapeText(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;");
    }

    function rebuild() {
      const rows = parseCSV(plantCSVText);
      const photos = parseCSV(photoCSVText);
      const logMap = combinedLogsByPlant(parseCSV(logCSVText));
      const photoMap = new Map();
      photos.forEach(ph => {
        if (!photoMap.has(ph.plant_id)) photoMap.set(ph.plant_id, []);
        photoMap.get(ph.plant_id).push(ph);
      });
      plants = rows.map(p => ({
        ...p,
        photos: (photoMap.get(p.id) || []).sort((a,b) => sortNatural(a.date + a.type, b.date + b.type)),
        logs: logMap.get(p.id) || []
      })).sort((a,b) => sortNatural(a.id, b.id));

      batchFilter.innerHTML = '<option value="">Alla partier</option>';
      [...new Set(plants.map(p => clean(p.batch)).filter(Boolean))]
        .sort((a,b) => sortNatural(a, b))
        .forEach(batch => {
          const option = document.createElement("option");
          option.value = batch;
          option.textContent = batch;
          batchFilter.appendChild(option);
        });

      statusFilter.innerHTML = '<option value="">Alla statusar</option>';
      [...new Set(plants.map(p => clean(p.status)).filter(Boolean))]
        .sort((a,b) => a.localeCompare(b, "sv"))
        .forEach(status => {
          const option = document.createElement("option");
          option.value = status;
          option.textContent = status;
          statusFilter.appendChild(option);
        });
      render();
    }

    function photoButtons(p, activeFile) {
      if ((p.photos || []).length <= 1) return "";
      return p.photos.map(photo => {
        const label = (photo.label || (photo.date + " · " + photo.type)) + (photo.day ? " · dag " + photo.day : "");
        return `
          <button class="thumb ${photo.file === activeFile ? "active" : ""}" type="button"
            data-plant="${escapeAttr(p.id)}" data-file="${photo.file}" data-label="${escapeAttr(label)}">
            <img src="${photo.file}" alt="${escapeAttr(p.id + " " + photo.date)}" loading="lazy">
          </button>`;
      }).join("");
    }

    function cardTemplate(p) {
      const photos = p.photos || [];
      const active = photos[photos.length - 1] || {};
      const activeFile = active.file || "";
      const activeLabel = active.label || (active.date ? `${active.date} · ${active.type}` : "");
      const dayText = active.day ? ` · dag ${active.day}` : "";
      const latestLog = latestPlantLog(p.logs);
      const gallery = photos.map(photo => {
        const label = (photo.label || (photo.date + " · " + photo.type)) + (photo.day ? " · dag " + photo.day : "");
        return {file: photo.file, title: p.id, caption: `${p.id} · ${label}`, alt: p.id};
      });
      const searchable = [
        p.id, p.batch, p.group, p.sown, p.status, p.decision, p.firstBloom, p.flowerColor, p.form, p.fertility, p.score, p.notes,
        ...photos.map(x => `${x.date} ${x.type} ${x.file}`),
        ...(p.logs || []).map(x => `${x.date} ${x.type} ${x.note}`)
      ].join(" ").toLowerCase();

      return `
        <article class="plant-card" data-search="${escapeAttr(searchable)}" data-batch="${escapeAttr(p.batch)}" data-status="${escapeAttr(p.status)}" data-category="Hibiskus" data-plant-id="${escapeAttr(p.id)}" data-plant-name="${escapeAttr(p.id)}" data-gallery="${escapeAttr(JSON.stringify(gallery))}" data-log="${escapeAttr(JSON.stringify(p.logs || []))}">
          <div class="image-wrap">
            ${activeFile ? `<img class="main-photo" src="${activeFile}" alt="${escapeAttr(p.id)}" data-caption="${escapeAttr(p.id + " · " + activeLabel + dayText)}">` : ""}
            ${activeLabel ? `<div class="date-ribbon">${activeLabel}${dayText}</div>` : ""}
          </div>
          ${photos.length > 1 ? `<div class="thumbs">${photoButtons(p, activeFile)}</div>` : ""}
          <div class="card-body">
            <div class="plant-head"><h2>${p.id}</h2><div class="score">${clean(p.score) || "—"}</div></div>
            <div class="import-actions">
              <button class="plant-log-btn" type="button" aria-label="Odlingslogg" title="Odlingslogg">${logBookIcon()}</button>
              <button class="add-photo-btn" type="button" aria-label="Lägg till bild" title="Lägg till bild">${cameraLineIcon()}</button>
              <span class="import-badge" data-import-badge hidden></span>
            </div>
            <div class="chips">${collectionChipHtml("Hibiskus", p, escapeText)}</div>
            <dl>
              <dt>Parti</dt><dd>${clean(p.batch) || "Ej ifyllt"}</dd>
              <dt>Korsning/fröparti</dt><dd>${clean(p.group) || "Ej ifyllt"}</dd>
              <dt>Sådd</dt><dd>${clean(p.sown) || "Ej ifyllt"}</dd>
              <dt>Första blomning</dt><dd>${clean(p.firstBloom) || "Ej ännu"}</dd>
              <dt>Blomfärg</dt><dd>${clean(p.flowerColor) || "Ej ännu"}</dd>
              <dt>Form</dt><dd>${clean(p.form) || "Ej ännu"}</dd>
              <dt>Fertilitet</dt><dd>${clean(p.fertility) || "Ej ännu"}</dd>
            </dl>
            ${milestoneSummary(latestLog)}
            ${clean(p.notes) ? `<div class="notes">${escapeText(clean(p.notes))}</div>` : ""}
          </div>
        </article>
      `;
    }

    function latestDate(p) {
      return (p.photos || []).map(photo => photo.date).filter(Boolean).sort().at(-1) || "";
    }

    function scoreValue(p) {
      const score = Number(clean(p.score).replace(",", "."));
      return Number.isFinite(score) ? score : -1;
    }

    function batchLogRows() {
      return parseCSV(logCSVText)
        .filter(row => clean(row.id) === "PL-H02")
        .sort((a, b) => sortNatural(b.date + b.id + b.type, a.date + a.id + a.type));
    }

    function renderBatchLog() {
      const batch = hibiscusBatches["PL-H02"];
      const rows = batchLogRows();
      batchLog.hidden = !rows.length;
      if (!rows.length) return;
      batchLog.innerHTML = `
        <div class="batch-log-head">
          <div>
            <h2>Batchlogg PL-H02</h2>
            <div class="batch-log-summary">${escapeText(batch.summary)}</div>
          </div>
          <button class="batch-log-toggle" type="button" aria-expanded="${batchLogOpen ? "true" : "false"}">${batchLogOpen ? "Dölj logg" : "Visa logg"}</button>
        </div>
        <div class="batch-log-detail" ${batchLogOpen ? "" : "hidden"}>
          <section class="batch-log-section">
            <h3>Batchfakta</h3>
            <div class="batch-facts">${batch.facts.map(fact => `<div class="batch-fact">${escapeText(fact)}</div>`).join("")}</div>
          </section>
          <section class="batch-log-section">
            <h3>Metod</h3>
            <p class="batch-method">${escapeText(batch.method)}</p>
          </section>
          <section class="batch-log-section">
            <h3>Händelser</h3>
            <div class="batch-log-list">
              ${rows.map(row => `
                <article class="batch-log-item">
                  <div class="batch-log-meta">
                    <span>${escapeText(row.date)}</span>
                    <span>${escapeText(row.type)}</span>
                  </div>
                  ${clean(row.note) ? `<div class="batch-log-note">${escapeText(row.note)}</div>` : ""}
                </article>
              `).join("")}
            </div>
          </section>
        </div>
      `;
    }

    function sortedPlants(list) {
      return [...list].sort((a, b) => {
        if (sortSelect.value === "latest") {
          return sortNatural(latestDate(b), latestDate(a)) || sortNatural(a.id, b.id);
        }
        if (sortSelect.value === "photos") {
          return ((b.photos || []).length - (a.photos || []).length) || sortNatural(a.id, b.id);
        }
        if (sortSelect.value === "score") {
          return scoreValue(b) - scoreValue(a) || sortNatural(a.id, b.id);
        }
        if (sortSelect.value === "status") {
          return sortNatural(clean(a.status) + a.id, clean(b.status) + b.id);
        }
        return sortNatural(a.id, b.id);
      });
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const selectedBatch = batchFilter.value;
      const selectedStatus = statusFilter.value;
      const filtered = plants.filter(p => {
        const combined = [
          p.id, p.batch, p.group, p.sown, p.status, p.decision, p.firstBloom, p.flowerColor, p.form, p.fertility, p.score, p.notes,
          ...(p.photos || []).map(x => `${x.date} ${x.type} ${x.file}`),
          ...(p.logs || []).map(x => `${x.date} ${x.type} ${x.note}`)
        ].join(" ").toLowerCase();
        return (!query || combined.includes(query))
          && (!selectedBatch || p.batch === selectedBatch)
          && (!selectedStatus || p.status === selectedStatus);
      });
      const visible = sortedPlants(filtered);
      grid.innerHTML = visible.length ? visible.map(cardTemplate).join("") : '<div class="empty">Inga hibiskusar matchar sökningen just nu.</div>';
      updatePlantImageImportUI();
      updatePlantFavoriteUI();
      const photoCount = plants.reduce((sum, p) => sum + (p.photos || []).length, 0);
      const activeParts = [
        query ? `Sökning: “${search.value.trim()}”` : "",
        selectedBatch ? `Parti: ${selectedBatch}` : "",
        selectedStatus ? `Status: ${selectedStatus}` : "",
        `Sortering: ${sortSelect.options[sortSelect.selectedIndex].textContent}`
      ].filter(Boolean);
      stats.innerHTML = `
        <span class="stat">${plants.length} plantor</span>
        <span class="stat">${photoCount} bilder</span>
        <span class="stat">${visible.length} visas just nu</span>
        <span class="stat">${activeParts.join(" · ")}</span>
      `;
      renderBatchLog();
    }

    grid.addEventListener("click", event => {
      const thumb = event.target.closest(".thumb");
      const main = event.target.closest(".main-photo");
      if (thumb) {
        const card = thumb.closest(".plant-card");
        const img = card.querySelector(".main-photo");
        const ribbon = card.querySelector(".date-ribbon");
        card.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
        thumb.classList.add("active");
        img.src = thumb.dataset.file;
        img.dataset.caption = `${thumb.dataset.plant} · ${thumb.dataset.label}`;
        ribbon.textContent = thumb.dataset.label;
      }
      if (main) {
        openPlantPhotoGallery(main);
      }
    });
    batchLog.addEventListener("click", event => {
      if (!event.target.closest(".batch-log-toggle")) return;
      batchLogOpen = !batchLogOpen;
      renderBatchLog();
    });
    ensurePlantPhotoGallery();
    ensurePlantLogs();
    ensurePlantImageImport();
    ensurePlantFavorites();
    printBtn.addEventListener("click", () => window.print());
    clearBtn.addEventListener("click", () => {
      search.value = "";
      batchFilter.value = "";
      statusFilter.value = "";
      sortSelect.value = "id";
      render();
    });
    search.addEventListener("input", render);
    batchFilter.addEventListener("change", render);
    statusFilter.addEventListener("change", render);
    sortSelect.addEventListener("change", render);
    window.addEventListener("plant-log-added", rebuild);
    rebuild();
  </script>
</body>
</html>
