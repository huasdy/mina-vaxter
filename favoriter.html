<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Favoriter</title>
  <style>
    :root {
      --bg: #f5f1ea; --paper: #fffdf8; --ink: #2b251f; --muted: #6f655b;
      --line: #ded2c2; --accent: #7d4f3b; --chip: #efe6da;
      --shadow: 0 14px 40px rgba(62, 43, 28, 0.12); --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, rgba(125,79,59,0.10), transparent 35rem),
                  radial-gradient(circle at top right, rgba(96,119,97,0.10), transparent 30rem),
                  var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    header { padding: 46px 22px 30px; text-align: center; }
    nav { margin-bottom: 18px; text-align: center; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
    nav a { color: var(--accent); text-decoration: none; font-weight: 750; }
    nav a.current { color: var(--ink); }
    .eyebrow { letter-spacing: .18em; text-transform: uppercase; font-size: .78rem; color: var(--accent); font-weight: 800; }
    h1 { margin: 8px 0 8px; font-family: Georgia, "Times New Roman", serif; font-size: clamp(2.7rem, 8vw, 5.6rem); line-height: .92; font-weight: 500; }
    .subtitle { margin: 0 auto; max-width: 760px; color: var(--muted); font-size: 1.05rem; }
    main { max-width: 1240px; margin: 0 auto; padding: 26px 18px 64px; }
    .favorite-tools { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 14px; }
    .favorite-tools button {
      border: 1px solid var(--line); border-radius: 999px; padding: 9px 14px; background: var(--paper);
      color: var(--accent); font: inherit; font-weight: 850; cursor: pointer;
    }
    .stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; color: var(--muted); }
    .stat { background: rgba(255,253,248,.74); border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; font-size: .92rem; font-weight: 650; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 18px; }
    .plant-card { background: var(--paper); border: 1px solid rgba(222,210,194,.95); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 100%; }
    .image-wrap { position: relative; aspect-ratio: 4 / 5; background: linear-gradient(135deg, rgba(125,79,59,.16), rgba(96,119,97,.14)), #eadfce; overflow: hidden; }
    .image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
    .image-empty { height: 100%; display: grid; place-items: center; color: var(--muted); font-weight: 800; }
    .date-ribbon { position: absolute; left: 12px; bottom: 12px; background: rgba(43,37,31,.76); color: white; border-radius: 999px; padding: 6px 10px; font-size: .8rem; font-weight: 750; backdrop-filter: blur(8px); }
    .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 12px; flex: 1; position: relative; }
    h2 { margin: 0; padding-right: 0; font-family: Georgia, "Times New Roman", serif; font-size: 1.55rem; line-height: 1.08; font-weight: 650; overflow-wrap: normal; word-break: normal; hyphens: none; }
    .latin { margin-top: -8px; color: var(--muted); font-style: italic; font-size: 1.02rem; }
    .favorite-log-action { display: flex; justify-content: flex-end; }
    dl { display: grid; grid-template-columns: auto 1fr; gap: 6px 10px; margin: 0; font-size: .94rem; }
    dt { color: var(--muted); font-weight: 800; }
    dd { margin: 0; }
    .favorite-focus { border-top: 1px solid var(--line); padding-top: 12px; margin-top: auto; display: grid; gap: 6px; }
    .favorite-focus label { color: var(--accent); font-size: .74rem; font-weight: 850; letter-spacing: .08em; text-transform: uppercase; }
    .favorite-focus textarea {
      width: 100%; min-height: 58px; border: 1px solid rgba(222,210,194,.92); border-radius: 14px;
      padding: 10px 11px; resize: vertical; background: rgba(255,255,255,.56); color: var(--ink); font: inherit;
      font-size: .94rem; line-height: 1.35;
    }
    .favorite-focus textarea::placeholder { color: rgba(111,101,91,.72); }
    footer { text-align: center; color: var(--muted); padding: 26px 18px 44px; font-size: .92rem; }
  </style>
</head>
<body>
  <header>
    <nav>
      <a href="index.html">← Mina Växter</a>
      <a href="hibiskusar.html">Hibiskus</a>
      <a href="pelargoner.html">Pelargon</a>
      <a href="citrus.html">Citrus</a>
      <a href="udda.html">Udda</a>
      <a class="current" href="favoriter.html">Favoriter</a>
      <a href="etiketter.html">Etiketter</a>
    </nav>
    <div class="eyebrow">Arbetsvy</div>
    <h1>Favoriter</h1>
    <p class="subtitle">Växter med hundöra, sådant du arbetar med eller vill ha nära just nu.</p>
  </header>

  <main>
    <div class="favorite-tools">
      <button type="button" id="exportFavoritesBtn">Exportera bevakning</button>
      <button type="button" id="importFavoritesBtn">Importera bevakning</button>
      <input id="importFavoritesInput" type="file" accept="application/json,.json" hidden>
    </div>
    <div class="stats" id="stats"></div>
    <section class="grid" id="favoriteGrid"></section>
  </main>

  <footer>Favoriter och Fokus kan exporteras och importeras mellan desktop och iPhone.</footer>

  <script src="common.js?v=20260709-milstolpar1"></script>
  <script type="text/plain" id="defaultMilestonesCSV">id,date,type,note
SP-003,2026-06-25,Sådd,Frön blötlagda 24 h med rökpapper före sådd.
SP-003,2026-07-04,Grodd,Första synliga grodd.
p-creamery,2026-07-04,Blomning,Ny blommbild importerad och gammal knoppbild ersatt.
p-prince-of-orange,2026-07-01,Blomning,Ny blommbild dokumenterad.
PL-H01-A,2025-11-16,Sådd,Surprise Pack såddes som del av PL-H01-partiet.
PL-H02-B-01,2026-07-06,Grodd,Första individuella plantan från delparti B.
PL-H02-D-01,2026-07-06,Grodd,Första individuella plantan från delparti D.
</script>
  <script>
    const grid = document.querySelector("#favoriteGrid");
    const stats = document.querySelector("#stats");
    const exportFavoritesBtn = document.querySelector("#exportFavoritesBtn");
    const importFavoritesBtn = document.querySelector("#importFavoritesBtn");
    const importFavoritesInput = document.querySelector("#importFavoritesInput");
    let favoriteLogs = combinedMilestonesByPlant(parseCSV(document.querySelector("#defaultMilestonesCSV").textContent));

    function favoriteCard(item) {
      const gallery = item.image ? [{file: item.image, title: item.plantName, caption: `${item.plantName} · ${item.dateLabel || ""}`, alt: item.plantName}] : [];
      const logs = favoriteLogs.get(item.plantId) || [];
      const latestMilestone = latestPlantMilestone(logs);
      return `
        <article class="plant-card" data-category="${escapeAttr(item.category)}" data-plant-id="${escapeAttr(item.plantId)}" data-plant-name="${escapeAttr(item.plantName)}" data-page="${escapeAttr(item.page || "index.html")}" data-gallery="${escapeAttr(JSON.stringify(gallery))}" data-milestones="${escapeAttr(JSON.stringify(logs))}">
          <div class="image-wrap">
            ${item.image ? `<img class="main-photo" src="${escapeAttr(item.image)}" alt="${escapeAttr(item.plantName)}" data-caption="${escapeAttr(item.plantName + (item.dateLabel ? " · " + item.dateLabel : ""))}">` : `<div class="image-empty">Bild saknas</div>`}
            ${item.dateLabel ? `<div class="date-ribbon">${escapeAttr(item.dateLabel)}</div>` : ""}
          </div>
          <div class="card-body">
            <div class="plant-card-head">
              <h2>${htmlEscape(item.plantName)}</h2>
              <div class="favorite-log-action">
                <button class="plant-log-btn" type="button" aria-label="Milstolpar" title="Milstolpar">${logBookIcon()}</button>
                <button class="add-photo-btn" type="button" aria-label="Lägg till bild" title="Lägg till bild">${cameraLineIcon()}</button>
                <span class="import-badge" data-import-badge hidden></span>
              </div>
            </div>
            ${item.latin ? `<div class="latin">${htmlEscape(item.latin)}</div>` : ""}
            <dl>
              <dt>ID</dt><dd>${htmlEscape(item.plantId)}</dd>
              <dt>Kategori</dt><dd>${htmlEscape(item.category)}</dd>
            </dl>
            ${milestoneSummary(latestMilestone)}
            <div class="favorite-focus">
              <label for="focus-${escapeAttr(item.key)}">Fokus</label>
              <textarea id="focus-${escapeAttr(item.key)}" data-focus-key="${escapeAttr(item.key)}" maxlength="120" rows="2" placeholder="Att göra...">${htmlEscape(item.focusNote || "")}</textarea>
            </div>
          </div>
        </article>
      `;
    }

    function renderFavoritesPage() {
      const favorites = Object.values(getPlantFavorites()).sort((a, b) =>
        sortNatural(`${a.category} ${a.plantName}`, `${b.category} ${b.plantName}`)
      );
      stats.innerHTML = `<span class="stat">${favorites.length} favoriter</span>`;
      grid.innerHTML = favorites.length
        ? favorites.map(favoriteCard).join("")
        : '<div class="favorite-empty">Inga favoriter ännu. Markera en växt med hundörat på ett kort.</div>';
      updatePlantFavoriteUI();
    }

	    document.addEventListener("click", event => {
	      const main = event.target.closest(".main-photo");
	      if (main) openPlantPhotoGallery(main);
	    });

    grid.addEventListener("input", event => {
	      const field = event.target.closest("[data-focus-key]");
	      if (!field) return;
	      const favorites = getPlantFavorites();
	      if (!favorites[field.dataset.focusKey]) return;
	      favorites[field.dataset.focusKey].focusNote = field.value.trim();
	      savePlantFavorites(favorites);
    });

    exportFavoritesBtn.addEventListener("click", () => {
      const payload = {
        exportedAt: new Date().toISOString(),
        favorites: getPlantFavorites()
      };
      const blob = new Blob([JSON.stringify(payload, null, 2)], {type: "application/json"});
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "mina-vaxter-bevakning.json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      URL.revokeObjectURL(url);
    });

    importFavoritesBtn.addEventListener("click", () => importFavoritesInput.click());
    importFavoritesInput.addEventListener("change", async () => {
      const file = importFavoritesInput.files && importFavoritesInput.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        const incoming = parsed && parsed.favorites && typeof parsed.favorites === "object" ? parsed.favorites : parsed;
        if (!incoming || typeof incoming !== "object" || Array.isArray(incoming)) throw new Error("Fel format");
        const exportedAt = parsed && parsed.exportedAt ? new Date(parsed.exportedAt).toLocaleString("sv-SE") : "okänd tid";
        const count = Object.keys(incoming).length;
        const ok = confirm(`Importera bevakning?\n\nFilen innehåller ${count} favoriter.\nExporterad: ${exportedAt}\n\nNuvarande bevakning i den här webbläsaren ersätts.`);
        if (!ok) return;
        savePlantFavorites(incoming);
        renderFavoritesPage();
      } catch (error) {
        alert("Kunde inte läsa bevakningsfilen.");
      } finally {
        importFavoritesInput.value = "";
      }
    });

    ensurePlantPhotoGallery();
    ensurePlantMilestones();
    ensurePlantImageImport();
    ensurePlantFavorites();
    window.addEventListener("plant-milestone-added", () => {
      favoriteLogs = combinedMilestonesByPlant(parseCSV(document.querySelector("#defaultMilestonesCSV").textContent));
      renderFavoritesPage();
    });
    renderFavoritesPage();
  </script>
</body>
</html>
