<!doctype html>
<html lang="sv">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Udda</title>
  <style>
    :root {
      --bg: #f5f1ea; --paper: #fffdf8; --ink: #2b251f; --muted: #6f655b;
      --line: #ded2c2; --accent: #7d4f3b; --chip: #efe6da;
      --shadow: 0 14px 40px rgba(62, 43, 28, 0.12); --radius: 22px;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at top left, rgba(125,79,59,0.10), transparent 35rem),
                  radial-gradient(circle at top right, rgba(96,119,97,0.10), transparent 30rem),
                  var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.5;
    }
    header { padding: 46px 22px 30px; text-align: center; }
    nav { margin-bottom: 18px; text-align: center; display: flex; justify-content: center; flex-wrap: wrap; gap: 12px; }
    nav a { color: var(--accent); text-decoration: none; font-weight: 750; }
    nav a.current { color: var(--ink); }
    .eyebrow { letter-spacing: .18em; text-transform: uppercase; font-size: .78rem; color: var(--accent); font-weight: 800; }
    h1 { margin: 8px 0 8px; font-family: Georgia, "Times New Roman", serif; font-size: clamp(2.7rem, 8vw, 5.6rem); line-height: .92; font-weight: 500; }
    .subtitle { margin: 0 auto; max-width: 860px; color: var(--muted); font-size: 1.05rem; }
    .toolbar {
      background: rgba(245,241,234,.84); border-top: 1px solid rgba(222,210,194,.75);
      border-bottom: 1px solid rgba(222,210,194,.95); padding: 14px 18px;
    }
    .toolbar-inner { max-width: 1240px; margin: 0 auto; display: grid; grid-template-columns: 1fr auto auto auto; gap: 10px; align-items: center; }
    input, select, button {
      border: 1px solid var(--line); background: var(--paper); border-radius: 999px; color: var(--ink);
      padding: 11px 14px; font-size: .95rem; font: inherit;
    }
    input[type="search"] { width: 100%; min-width: 0; }
    button { cursor: pointer; background: var(--accent); color: white; border-color: var(--accent); font-weight: 750; white-space: nowrap; }
    button.secondary { background: var(--paper); color: var(--accent); border-color: rgba(125,79,59,.35); }
    main { max-width: 1240px; margin: 0 auto; padding: 26px 18px 64px; }
    .stats { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 22px; color: var(--muted); }
    .stat { background: rgba(255,253,248,.74); border: 1px solid var(--line); border-radius: 999px; padding: 8px 12px; font-size: .92rem; font-weight: 650; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(285px, 1fr)); gap: 18px; }
    .empty { grid-column: 1 / -1; background: rgba(255,253,248,.78); border: 1px solid var(--line); border-radius: 18px; padding: 24px; color: var(--muted); text-align: center; font-weight: 650; }
    .plant-card { background: var(--paper); border: 1px solid rgba(222,210,194,.95); border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow); display: flex; flex-direction: column; min-height: 100%; }
    .image-wrap { position: relative; aspect-ratio: 4 / 5; background: linear-gradient(135deg, rgba(125,79,59,.16), rgba(96,119,97,.14)), #eadfce; overflow: hidden; }
    .image-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; cursor: zoom-in; }
    .image-empty { width: 100%; height: 100%; display: grid; place-items: center; color: rgba(111,101,91,.72); font-weight: 800; text-align: center; padding: 24px; }
    .date-ribbon { position: absolute; left: 12px; bottom: 12px; background: rgba(43,37,31,.76); color: white; border-radius: 999px; padding: 6px 10px; font-size: .8rem; font-weight: 750; backdrop-filter: blur(8px); }
    .thumbs { display: flex; gap: 8px; padding: 0; flex-wrap: wrap; margin-top: -2px; }
    .thumb { border: 2px solid transparent; background: transparent; padding: 0; border-radius: 12px; overflow: hidden; width: 58px; height: 58px; cursor: pointer; }
    .thumb.active { border-color: var(--accent); }
    .thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .card-body { padding: 16px 18px 18px; display: flex; flex-direction: column; gap: 12px; flex: 1; }
    h2 { margin: 0; font-family: Georgia, "Times New Roman", serif; font-size: 1.55rem; line-height: 1.08; font-weight: 650; }
    .latin { color: var(--muted); font-style: italic; margin-top: -8px; }
    .chips { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip { background: var(--chip); color: var(--muted); border-radius: 999px; padding: 5px 9px; font-size: .8rem; font-weight: 700; }
    .chip.green { background: rgba(96,119,97,.17); color: #435943; }
    .chip.gold { background: rgba(181,138,69,.18); color: #77572a; }
    dl { display: grid; grid-template-columns: auto 1fr; gap: 6px 10px; margin: 0; font-size: .94rem; }
    dt { color: var(--muted); font-weight: 800; }
    dd { margin: 0; }
    .notes { color: var(--muted); border-top: 1px solid var(--line); padding-top: 12px; margin-top: auto; font-size: .94rem; min-height: 2.2em; }
    dialog { border: none; padding: 0; background: transparent; max-width: min(92vw, 1000px); max-height: 92vh; }
    dialog::backdrop { background: rgba(0,0,0,.72); }
    .modal-img { display: block; max-width: 100%; max-height: 88vh; border-radius: 18px; background: white; }
    .modal-caption { color: white; text-align: center; padding-top: 10px; font-weight: 700; }
    footer { text-align: center; color: var(--muted); padding: 26px 18px 44px; font-size: .92rem; }
    @media (max-width: 700px) {
      .image-wrap { aspect-ratio: auto; height: min(280px, 65vw); }
    }
    @media (max-width: 900px) { .toolbar-inner { grid-template-columns: 1fr; } select, button { width: 100%; text-align: center; } }
  </style>
</head>
<body>

    <h1>Udda</h1>
    <p class="subtitle">Art- och gruppkatalog för udda växter, doftväxter, samplanteringar och frögrupper där individ-ID inte är det viktiga.</p>
  </header>

  <section class="toolbar">
    <div class="toolbar-inner">
      <input id="search" type="search" placeholder="Sök namn, latinskt namn, typ, tagg, ursprung eller anteckning…">
      <select id="typeFilter"><option value="">Alla typer</option></select>
      <select id="sortSelect">
        <option value="name">Namn A-Ö</option>
        <option value="type">Typ</option>
        <option value="status">Status</option>
        <option value="latest">Senaste bild</option>
        <option value="photos">Flest bilder</option>
      </select>
      <button class="secondary" id="clearBtn" type="button">Rensa</button>
    </div>
  </section>

  <main>
    <div class="stats" id="stats"></div>
    <section class="grid" id="grid"></section>
  </main>

  <dialog id="photoDialog">
    <img class="modal-img" id="modalImg" alt="">
    <div class="modal-caption" id="modalCaption"></div>
  </dialog>

  <footer>Serverfri lokal HTML-katalog.</footer>

  <script src="common.js?v=20260721synk1717"></script>
  <script>
    let plants = [];
    let plantCSVText = document.querySelector("#defaultPlantsCSV").textContent;
    let photoCSVText = document.querySelector("#defaultPhotosCSV").textContent;
    let milestoneCSVText = document.querySelector("#defaultMilestonesCSV").textContent;

    const grid = document.querySelector("#grid");
    const search = document.querySelector("#search");
    const typeFilter = document.querySelector("#typeFilter");
    const sortSelect = document.querySelector("#sortSelect");
    const clearBtn = document.querySelector("#clearBtn");
    const stats = document.querySelector("#stats");
    const dialog = document.querySelector("#photoDialog");
    const modalImg = document.querySelector("#modalImg");
    const modalCaption = document.querySelector("#modalCaption");

    function escapeText(value) {
      return String(value || "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;");
    }

    function tagList(value) {
      return String(value || "").split(";").map(tag => tag.trim()).filter(Boolean);
    }

    function rebuild() {
      const rows = parseCSV(plantCSVText);
      const photos = parseCSV(photoCSVText);
      const logMap = combinedMilestonesByPlant(parseCSV(milestoneCSVText));
      const photoMap = new Map();
      photos.forEach(ph => {
        if (!photoMap.has(ph.plant_id)) photoMap.set(ph.plant_id, []);
        photoMap.get(ph.plant_id).push(ph);
      });
      plants = rows.map(p => ({
        ...p,
        photos: (photoMap.get(p.id) || []).sort((a,b) => sortNatural(a.date + a.type, b.date + b.type)),
        logs: logMap.get(p.id) || []
      })).sort((a,b) => sortNatural(a.name, b.name));

      typeFilter.innerHTML = '<option value="">Alla typer</option>';
      [...new Set(plants.map(p => clean(p.type)).filter(Boolean))]
        .sort((a,b) => a.localeCompare(b, "sv"))
        .forEach(type => {
          const option = document.createElement("option");
          option.value = type;
          option.textContent = type;
          typeFilter.appendChild(option);
        });
      render();
    }

    function photoButtons(p, activeFile) {
      if ((p.photos || []).length <= 1) return "";
      return p.photos.map(photo => `
        <button class="thumb ${photo.file === activeFile ? "active" : ""}" type="button"
          data-plant="${escapeAttr(p.name)}" data-file="${photo.file}" data-label="${escapeAttr(photo.label || (photo.date + " · " + photo.type))}">
          <img src="${photo.file}" alt="${escapeAttr(p.name + " " + photo.date)}" loading="lazy">
        </button>`).join("");
    }

    function cardTemplate(p) {
      const photos = p.photos || [];
      const active = photos[photos.length - 1] || {};
      const activeFile = active.file || "";
      const activeLabel = active.label || (active.date ? `${active.date} · ${active.type}` : "");
      const latestMilestone = latestPlantMilestone(p.logs);
      const gallery = photos.map(photo => {
        const label = photo.label || (photo.date + " · " + photo.type);
        return {file: photo.file, title: p.name, caption: `${p.name} · ${label}`, alt: p.name};
      });
      const chips = collectionChipHtml("Udda", p, escapeText);
      const searchable = [
        p.id, p.name, p.latin, p.type, p.tags, p.status, p.source, p.notes,
        ...photos.map(x => `${x.date} ${x.type} ${x.file}`),
        ...(p.logs || []).map(x => `${x.date} ${x.type} ${x.note}`)
      ].join(" ").toLowerCase();

      return `
        <article class="plant-card" data-search="${escapeAttr(searchable)}" data-type="${escapeAttr(p.type)}" data-category="Udda" data-plant-id="${escapeAttr(p.id)}" data-plant-name="${escapeAttr(clean(p.name) || p.id)}" data-gallery="${escapeAttr(JSON.stringify(gallery))}" data-milestones="${escapeAttr(JSON.stringify(p.logs || []))}">
          <div class="image-wrap">
            ${activeFile ? `<img class="main-photo" src="${activeFile}" alt="${escapeAttr(p.name)}" data-caption="${escapeAttr(p.name + " · " + activeLabel)}">` : `<div class="image-empty">Bild saknas</div>`}
            ${activeLabel ? `<div class="date-ribbon">${activeLabel}</div>` : ""}
          </div>
          <div class="card-body">
            <h2>${escapeText(clean(p.name) || p.id)}</h2>
            <div class="import-actions">
              <button class="plant-log-btn" type="button" aria-label="Milstolpar" title="Milstolpar">${logBookIcon()}</button>
              <button class="add-photo-btn" type="button" aria-label="Lägg till bild" title="Lägg till bild">${cameraLineIcon()}</button>
              <span class="import-badge" data-import-badge hidden></span>
            </div>
            <div class="latin">${escapeText(clean(p.latin))}</div>
            <div class="chips">${chips}</div>
            ${photos.length > 1 ? `<div class="thumbs">${photoButtons(p, activeFile)}</div>` : ""}
            <dl>
              <dt>ID</dt><dd>${escapeText(p.id)}</dd>
              <dt>Ursprung</dt><dd>${escapeText(clean(p.source) || "Ej ifyllt")}</dd>
            </dl>
            ${milestoneSummary(latestMilestone)}
            ${clean(p.notes) ? `<div class="notes">${escapeText(clean(p.notes))}</div>` : ""}
          </div>
        </article>
      `;
    }

    function latestDate(p) {
      return (p.photos || []).map(photo => photo.date).filter(Boolean).sort().at(-1) || "";
    }

    function sortedPlants(list) {
      return [...list].sort((a, b) => {
        if (sortSelect.value === "type") {
          return sortNatural(clean(a.type) + a.name, clean(b.type) + b.name);
        }
        if (sortSelect.value === "status") {
          return sortNatural(clean(a.status) + a.name, clean(b.status) + b.name);
        }
        if (sortSelect.value === "latest") {
          return sortNatural(latestDate(b), latestDate(a)) || sortNatural(a.name, b.name);
        }
        if (sortSelect.value === "photos") {
          return ((b.photos || []).length - (a.photos || []).length) || sortNatural(a.name, b.name);
        }
        return sortNatural(a.name, b.name);
      });
    }

    function render() {
      const query = search.value.trim().toLowerCase();
      const selectedType = typeFilter.value;
      const filtered = plants.filter(p => {
        const combined = [
          p.id, p.name, p.latin, p.type, p.tags, p.status, p.source, p.notes,
          ...(p.photos || []).map(x => `${x.date} ${x.type} ${x.file}`),
          ...(p.logs || []).map(x => `${x.date} ${x.type} ${x.note}`)
        ].join(" ").toLowerCase();
        return (!query || combined.includes(query)) && (!selectedType || p.type === selectedType);
      });
      const visible = sortedPlants(filtered);
      grid.innerHTML = visible.length ? visible.map(cardTemplate).join("") : '<div class="empty">Inga udda växter matchar sökningen just nu.</div>';
      updatePlantImageImportUI();
      updatePlantFavoriteUI();
      const photoCount = plants.reduce((sum, p) => sum + (p.photos || []).length, 0);
      const activeParts = [
        query ? `Sökning: “${search.value.trim()}”` : "",
        selectedType ? `Typ: ${selectedType}` : "",
        `Sortering: ${sortSelect.options[sortSelect.selectedIndex].textContent}`
      ].filter(Boolean);
      stats.innerHTML = `
        <span class="stat">${plants.length} poster</span>
        <span class="stat">${photoCount} bilder</span>
        <span class="stat">${visible.length} visas just nu</span>
        <span class="stat">${activeParts.join(" · ")}</span>
      `;
    }

    grid.addEventListener("click", event => {
      const thumb = event.target.closest(".thumb");
      const main = event.target.closest(".main-photo");
      if (thumb) {
        const card = thumb.closest(".plant-card");
        const img = card.querySelector(".main-photo");
        const ribbon = card.querySelector(".date-ribbon");
        card.querySelectorAll(".thumb").forEach(t => t.classList.remove("active"));
        thumb.classList.add("active");
        img.src = thumb.dataset.file;
        img.dataset.caption = `${thumb.dataset.plant} · ${thumb.dataset.label}`;
        ribbon.textContent = thumb.dataset.label;
      }
      if (main) {
        openPlantPhotoGallery(main);
      }
    });
    ensurePlantPhotoGallery();
    ensurePlantMilestones();
    ensurePlantImageImport();
    ensurePlantFavorites();
    clearBtn.addEventListener("click", () => {
      search.value = "";
      typeFilter.value = "";
      sortSelect.value = "name";
      render();
    });
    search.addEventListener("input", render);
    typeFilter.addEventListener("change", render);
    sortSelect.addEventListener("change", render);
    window.addEventListener("plant-milestone-added", rebuild);
    rebuild();
  </script>
