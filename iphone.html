    .photo-button.active { border-color: var(--accent); }
    .photo-button img { width: 100%; height: 100%; object-fit: cover; display: block; }
    .body { padding: 14px; }
    h2 { font-family: Georgia, "Times New Roman", serif; font-size: 1.5rem; line-height: 1.08; margin: 0; padding-right: 0; overflow-wrap: normal; word-break: normal; hyphens: none; }

    .chip { background: var(--chip); color: var(--muted); border-radius: 999px; padding: 5px 8px; font-size: .8rem; font-weight: 750; }
    .notes { color: var(--muted); border-top: 1px solid var(--line); padding-top: 10px; margin-top: 10px; }
    .empty { background: var(--paper); border: 1px solid var(--line); border-radius: 18px; padding: 22px; color: var(--muted); text-align: center; font-weight: 750; }

  <script src="common.js?v=20260705-layout1"></script>
  <script>
    const data = JSON.parse(document.querySelector('#catalogData').textContent);
    const logMap = logsByPlant(parseCSV(document.querySelector('#defaultLogsCSV').textContent));
    const tabs = document.querySelector('#tabs');
    const grid = document.querySelector('#grid');
    const stats = document.querySelector('#stats');
    const search = document.querySelector('#search');
    let active = 'Hibiskus';

    function clean(value) { return String(value || '').trim(); }
    function escapeHtml(value) { return String(value || '').replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;').replaceAll('"', '&quot;'); }
    function pageForCategory(category) {
      return {
        Hibiskus: "hibiskusar.html",
        Pelargon: "pelargoner.html",
        Citrus: "citrus.html",
        Udda: "udda.html"
      }[category] || "index.html";
    }
    function collectionChips(category, row) {
      const haystack = [
        category, row.id, row.name, row.latin, row.type, row.tags, row.status, row.scent, row.source, row.notes
      ].map(clean).join(" ").toLowerCase();
      const chips = [];
      const add = value => { if (value && !chips.includes(value)) chips.push(value); };
      if (category === "Hibiskus") {
        add("Projekt");
        add("Egen frösådd");
      } else if (category === "Pelargon") {
        if (haystack.includes("doft")) add("Doft");
        if (haystack.includes("vild") || haystack.includes("bonsai") || haystack.includes("brokbladig")) add("Unik");
      } else if (category === "Citrus") {
        add("Inne");
      } else if (category === "Udda") {
        if (haystack.includes("doft") || haystack.includes("patchouli") || haystack.includes("salvia")) add("Doft");
        if (haystack.includes("frö") || haystack.includes("sådd")) add("Egen frösådd");
        if (!haystack.includes("fredskalla")) add("Unik");
        if (haystack.includes("fredskalla") || haystack.includes("hjärtbräken")) add("Inne");
      }
      return chips.length ? chips : [category];
    }
    function renderTabs() {
      const names = [...Object.keys(data), "Favoriter"];
      tabs.innerHTML = names.map(name => `<button class="tab ${name === active ? 'active' : ''}" type="button" data-name="${escapeHtml(name)}">${escapeHtml(name)}</button>`).join('');
    }
    function card(section, row, categoryName) {
      const photos = row.photos || [];
      const title = clean(row[section.titleKey]) || clean(row.id);
      const activePhoto = photos[photos.length - 1];
      const gallery = photos.map(photo => {
        const label = photo.label || photo.date || title;
        return {file: photo.file, title, caption: `${title} · ${label}`, alt: title};
      });
      const activeLabel = activePhoto ? (activePhoto.label || activePhoto.date || title) : "";
      const logs = logMap.get(row.id) || [];
      const image = activePhoto ? `<div class="image"><img class="main-photo" src="${escapeHtml(activePhoto.file)}" alt="${escapeHtml(title)}" data-caption="${escapeHtml(title + " · " + activeLabel)}" loading="lazy"></div>` : `<div class="image"></div>`;
      const thumbs = photos.length > 1 ? `<div class="photo-strip">${photos.map(photo => `
        <button class="photo-button ${photo.file === activePhoto.file ? 'active' : ''}" type="button" data-file="${escapeHtml(photo.file)}" data-label="${escapeHtml(photo.label || photo.date || title)}" aria-label="${escapeHtml(photo.label || photo.date || title)}">
          <img src="${escapeHtml(photo.file)}" alt="" loading="lazy">
        </button>`).join('')}</div>` : '';
      const chips = collectionChips(categoryName, row).map(value => `<span class="chip">${escapeHtml(value)}</span>`).join('');
      const notes = clean(row[section.notes]);
      return `<article class="card plant-card" data-category="${escapeHtml(categoryName)}" data-plant-id="${escapeHtml(row.id)}" data-plant-name="${escapeHtml(title)}" data-page="${escapeHtml(pageForCategory(categoryName))}" data-gallery="${escapeHtml(JSON.stringify(gallery))}" data-log="${escapeHtml(JSON.stringify(logs))}">
        ${image}
        ${thumbs}
        <div class="body card-body">
          <div class="plant-card-head">
            <h2>${escapeHtml(title)}</h2>
            <div class="import-actions">
              <button class="plant-log-btn" type="button" aria-label="Odlingslogg" title="Odlingslogg">${logBookIcon()}</button>
              <button class="add-photo-btn" type="button" aria-label="Lägg till bild" title="Lägg till bild">${cameraLineIcon()}</button>
              <span class="import-badge" data-import-badge hidden></span>
            </div>
          </div>
          <div class="chips">${chips}</div>
          ${notes ? `<div class="notes">${escapeHtml(notes)}</div>` : ''}
        </div>
      </article>`;
    }
    function favoriteCard(item) {
      const gallery = item.image ? [{file: item.image, title: item.plantName, caption: `${item.plantName} · ${item.dateLabel || ""}`, alt: item.plantName}] : [];
      const logs = logMap.get(item.plantId) || [];
      const latestLog = latestPlantLog(logs);
      return `<article class="card plant-card" data-category="${escapeHtml(item.category)}" data-plant-id="${escapeHtml(item.plantId)}" data-plant-name="${escapeHtml(item.plantName)}" data-page="${escapeHtml(item.page || pageForCategory(item.category))}" data-gallery="${escapeHtml(JSON.stringify(gallery))}" data-log="${escapeHtml(JSON.stringify(logs))}">
        <div class="image">${item.image ? `<img class="main-photo" src="${escapeHtml(item.image)}" alt="${escapeHtml(item.plantName)}" data-caption="${escapeHtml(item.plantName + (item.dateLabel ? " · " + item.dateLabel : ""))}" loading="lazy">` : ""}</div>
        <div class="body card-body">
          <div class="plant-card-head">
            <h2>${escapeHtml(item.plantName)}</h2>
            <div class="import-actions">
              <button class="plant-log-btn" type="button" aria-label="Odlingslogg" title="Odlingslogg">${logBookIcon()}</button>
              <button class="add-photo-btn" type="button" aria-label="Lägg till bild" title="Lägg till bild">${cameraLineIcon()}</button>
              <span class="import-badge" data-import-badge hidden></span>
            </div>
          </div>
          ${item.latin ? `<div class="latin">${escapeHtml(item.latin)}</div>` : ""}
          <div class="chips">${(item.chips || []).map(value => `<span class="chip">${escapeHtml(value)}</span>`).join("")}</div>
          ${milestoneSummary(latestLog)}
          ${item.focusNote ? `<div class="notes">${escapeHtml(item.focusNote)}</div>` : item.notes ? `<div class="notes">${escapeHtml(item.notes)}</div>` : ""}
        </div>
      </article>`;
    }
    function render() {
      renderTabs();
      if (active === "Favoriter") {
        const favorites = Object.values(getPlantFavorites()).sort((a, b) => sortNatural(`${a.category} ${a.plantName}`, `${b.category} ${b.plantName}`));
        const q = search.value.trim().toLowerCase();
        const rows = favorites.filter(item => !q || JSON.stringify(item).toLowerCase().includes(q));
        stats.textContent = `${rows.length} favoriter`;
        grid.innerHTML = rows.length ? rows.map(favoriteCard).join('') : '<div class="empty">Inga favoriter ännu. Markera en växt med hundörat på ett kort.</div>';
        updatePlantFavoriteUI();
        return;
      }
      const section = data[active];
      const q = search.value.trim().toLowerCase();
      const rows = section.rows.filter(row => !q || JSON.stringify(row).toLowerCase().includes(q));
      stats.textContent = `${rows.length} visas av ${section.rows.length}`;
      grid.innerHTML = rows.length ? rows.map(row => card(section, row, active)).join('') : '<div class="empty">Inga växter matchar sökningen.</div>';
      updatePlantFavoriteUI();
    }
    tabs.addEventListener('click', event => {
      const button = event.target.closest('.tab');
      if (!button) return;
      active = button.dataset.name;
      search.value = '';
      render();
    });
    grid.addEventListener('click', event => {
      const button = event.target.closest('.photo-button');
      const main = event.target.closest('.main-photo');
      if (button) {
        const card = button.closest('.card');
        const image = card.querySelector('.main-photo');
        if (!image) return;
        image.src = button.dataset.file;
        image.dataset.caption = `${image.alt} · ${button.dataset.label}`;
        card.querySelectorAll('.photo-button').forEach(item => item.classList.remove('active'));
        button.classList.add('active');
      }
      if (main) openPlantPhotoGallery(main);
    });
    ensurePlantPhotoGallery();
    ensurePlantLogs();
    ensurePlantImageImport();
    ensurePlantFavorites();
    document.addEventListener('click', event => {
      if (active === "Favoriter" && event.target.closest('.favorite-corner')) {
        setTimeout(render, 0);
      }
    });
    search.addEventListener('input', render);
    render();
  </script>
