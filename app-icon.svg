      <path d="M553 528 C596 496 639 467 681 448"/>
      <path d="M430 611 C405 561 380 517 354 482"/>
      <path d="M365 700 C344 665 324 629 302 602"/>
      <path d="M450 716 C492 724 532 717 574 702"/>
