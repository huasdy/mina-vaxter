<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">Mina Vaxter appikon</title>
  <desc id="desc">En matt mork olivgron rundad kvadrat med en elfenbensfarad asymmetrisk salviakvist i mjuk relief.</desc>
  <defs>
    <linearGradient id="background" x1="180" y1="82" x2="844" y2="942" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#374320"/>
      <stop offset=".55" stop-color="#253016"/>
      <stop offset="1" stop-color="#19220f"/>
    </linearGradient>
    <radialGradient id="matteLight" cx="38%" cy="22%" r="72%">
      <stop offset="0" stop-color="#516035" stop-opacity=".26"/>
      <stop offset=".55" stop-color="#2e391d" stop-opacity=".08"/>
      <stop offset="1" stop-color="#11170b" stop-opacity=".34"/>
    </radialGradient>
    <linearGradient id="leaf" x1="250" y1="760" x2="760" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f8f0dc"/>
      <stop offset=".46" stop-color="#efe6ce"/>
      <stop offset="1" stop-color="#fff9e8"/>
    </linearGradient>
    <linearGradient id="leafShade" x1="206" y1="754" x2="725" y2="183" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#d8ceb6"/>
      <stop offset=".56" stop-color="#fff7e5"/>
      <stop offset="1" stop-color="#cfc4ab"/>
    </linearGradient>
    <filter id="innerShadow" x="-8%" y="-8%" width="116%" height="116%">
      <feOffset dx="0" dy="10"/>
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feComposite in="blur" in2="SourceAlpha" operator="out" result="outer"/>
      <feColorMatrix in="outer" type="matrix" values="0 0 0 0 0.04 0 0 0 0 0.055 0 0 0 0 0.025 0 0 0 .62 0"/>
      <feBlend in2="SourceGraphic" mode="multiply"/>
    </filter>
    <filter id="symbolShadow" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#070a05" flood-opacity=".38"/>
      <feDropShadow dx="-2" dy="-3" stdDeviation="3" flood-color="#fff8df" flood-opacity=".20"/>
    </filter>
    <filter id="softEmboss" x="-18%" y="-18%" width="136%" height="136%">
      <feDropShadow dx="0" dy="6" stdDeviation="4" flood-color="#0b0f08" flood-opacity=".20"/>
      <feDropShadow dx="-2" dy="-2" stdDeviation="2" flood-color="#fff8df" flood-opacity=".18"/>
    </filter>
    <clipPath id="iconClip">
      <rect x="32" y="32" width="960" height="960" rx="188" ry="188"/>
    </clipPath>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect x="32" y="32" width="960" height="960" rx="188" fill="url(#background)"/>
    <rect x="32" y="32" width="960" height="960" rx="188" fill="url(#matteLight)"/>
    <rect x="49" y="49" width="926" height="926" rx="170" fill="none" stroke="#66724b" stroke-opacity=".22" stroke-width="5"/>
    <rect x="67" y="67" width="890" height="890" rx="152" fill="none" stroke="#0e1508" stroke-opacity=".44" stroke-width="6" filter="url(#innerShadow)"/>
  </g>

